<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Calculadora IMC</title>
</head>
<body>
    <h1>Cálculo do IMC</h1>
    <hr>
    <form action="" method="post">
        <label for="">Nome: </label><input type="text" id="nome">
        <label for="">Peso(Kg): </label><input type="number" id="peso" step="0.01">
        <label for="">Altura(m): </label><input type="number" id="altura" step="0.01">
        <button type="button" id="botaoEnvia">Enviar</button>
    </form>
    <span id="erro" style="color: red;"></span>
    <h2>Resultado:</h2>
    <hr>
    <span id="resultado"></span>
</body>
</html>
